plugins:
  digest_campaigns_enabled:
    default: true
    client: false
    type: bool

  digest_campaigns_poller_every_minutes:
    default: 1
    min: 1
    max: 60
    client: false
    type: integer

  digest_campaigns_claim_rows_per_run:
    default: 2000
    min: 1
    max: 20000
    client: false
    type: integer

  digest_campaigns_batch_chunk_size:
    default: 25
    min: 1
    max: 500
    client: false
    type: integer

  # For 50k in 3 hours: ~278/min. Use 300/min headroom.
  digest_campaigns_target_per_minute:
    default: 300
    min: 1
    max: 5000
    client: false
    type: integer

  digest_campaigns_processing_stale_minutes:
    default: 60
    min: 5
    max: 1440
    client: false
    type: integer

  digest_campaigns_only_campaign_key:
    default: ""
    client: false
    type: string

  digest_campaigns_subject_prefix:
    default: "[Campaign Digest]"
    client: false
    type: string

  digest_campaigns_respect_digest_unsubscribe:
    default: true
    client: false
    type: bool

  # =========================================================
  # NEW: Campaign-only excerpt trimming control
  # =========================================================

  digest_campaigns_trim_excerpts_enabled:
    default: true
    client: false
    type: bool

  # Number of first digest topics whose excerpts should NOT be trimmed.
  # 0 = trim all topics
  # 1 = trim all except first topic (DEFAULT)
  # 2 = trim all except first 2 topics, etc.
  digest_campaigns_trim_excerpts_ignore_first_n_topics:
    default: 1
    min: 0
    max: 20
    client: false
    type: integer

  # =========================================================
  # NEW: Domain swapping (post-process, after all other logic)
  # =========================================================

  # If enabled, the plugin will replace the host of ALL http(s) links in the final email
  # (HTML + text + unsubscribe) where the host matches the Discourse hostname.
  digest_campaigns_domain_swap_enabled:
    default: false
    client: false
    type: bool

  # If enabled, swap link hosts inside the HTML part (href/src/etc.)
  digest_campaigns_domain_swap_html_links_enabled:
    default: true
    client: false
    type: bool

  # If enabled, swap link hosts inside the text part
  digest_campaigns_domain_swap_text_links_enabled:
    default: true
    client: false
    type: bool

  # If enabled, swap raw domain occurrences (not just URLs) in bodies/headers.
  # This will also affect places like "@myhealthyhaven.org" in plain text.
  digest_campaigns_domain_swap_everywhere_enabled:
    default: false
    client: false
    type: bool

  # If enabled, swap domains inside selected headers (List-Unsubscribe, etc.)
  digest_campaigns_domain_swap_headers_enabled:
    default: true
    client: false
    type: bool

  # If enabled, also swap the domain part of the Message-ID header (<...@domain>)
  digest_campaigns_domain_swap_message_id_enabled:
    default: false
    client: false
    type: bool

  # One or more target domains (hosts) to swap to.
  # Supply comma / space / newline separated values. A random one is chosen per email.
  # Example: "a.example.com,b.example.com"
  digest_campaigns_domain_swap_targets:
    default: ""
    client: false
    type: string

  # =========================================================
  # Debugging
  # =========================================================

  # If enabled, logs generated email_id + campaign_id for each campaign email to Rails log
  # (visible in /logs). Use only while debugging.
  digest_campaigns_email_id_debug_enabled:
    default: false
    client: false
    type: bool

  # If enabled, after a successful campaign send we also set user_stats.digest_attempted_at = now.
  # This makes the campaign behave like a digest "attempt" for scheduling purposes (so the user
  # won't be picked again immediately by the core digest enqueue job).
  digest_campaigns_update_digest_attempted_at_on_send:
    default: false
    client: false
    type: bool

  # =========================================================
  # HTML Campaigns (Custom HTML body)
  # =========================================================

  # Optional override URL for the logo image used in HTML campaigns.
  # If blank, we fall back to Discourse logo settings.
  digest_campaigns_html_logo_image_url:
    default: ""
    client: false
    type: string

  # If enabled, rewrite ALL http(s) links inside the HTML campaign body to your /content redirector,
  # after first appending tracking params to the original URL.
  digest_campaigns_html_content_redirector_enabled:
    default: false
    client: false
    type: bool

  # If enabled, when HTML campaign content redirector rewriting is enabled we will also append
  # tracking params to the ORIGINAL destination URL before encoding it into /content?u=...
  # Params appended: aff_sub3 + subid3 (value is user/topic/email_id composite).
  digest_campaigns_html_content_redirector_append_params_enabled:
    default: true
    client: false
    type: bool

  # If enabled, HTML campaign link rewriting will use an EXTERNAL redirector endpoint:
  # https://<domain>/pages/unsubredirect?... instead of the local /content endpoint.
  digest_campaigns_html_external_redirector_enabled:
    default: false
    client: false
    type: bool

  # Domain ONLY for the external redirector endpoint (no scheme, no path).
  # Example: "indigo-temple.com"
  digest_campaigns_html_external_redirector_domain:
    default: ""
    client: false
    type: string

  # If enabled, external redirector parameter "emailsentid" will use the generated email_id.
  # If disabled, it will use the static integer below.
  digest_campaigns_html_external_redirector_emailsentid_use_email_id:
    default: false
    client: false
    type: bool

  # Static emailsentid value used when emailsentid_use_email_id is disabled.
  digest_campaigns_html_external_redirector_emailsentid_static:
    default: 9999999
    min: 1
    max: 9999999999
    client: false
    type: integer

  # One-line unsubscribe block text (shown before the unsubscribe link).
  digest_campaigns_html_unsubscribe_text:
    default: "To stop receiving these emails, click:"
    client: false
    type: string

  # Unsubscribe link text.
  digest_campaigns_html_unsubscribe_link_text:
    default: "Unsubscribe"
    client: false
    type: string

  # Font size (px) for the two optional preheader lines in HTML campaigns.
  digest_campaigns_html_preheader_font_size:
    default: 13
    min: 8
    max: 40
    client: false
    type: integer
